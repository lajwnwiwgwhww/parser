<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	<!-- Запрет зума, поддержка выреза экрана (notch) через viewport-fit=cover -->
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
	/>
	<meta name="theme-color" content="#0098EA" />
	<title>Getgems NFT Анализатор</title>

	<!-- Официальный скрипт Telegram WebApp (обязательно в самом верху head) -->
	<script src="https://telegram.org/js/telegram-web-app.js"></script>

	<style>
		/* ============================================================
		   1. ПЕРЕМЕННЫЕ ТЕМЫ
		   Базовые значения берём из Telegram WebApp CSS-переменных,
		   но даём fallback-значения на случай запуска вне Telegram.
		   ============================================================ */
		:root {
			--bg: var(--tg-theme-bg-color, #ffffff);
			--text: var(--tg-theme-text-color, #1c1c1e);
			--hint: var(--tg-theme-hint-color, #8e8e93);
			--link: var(--tg-theme-link-color, #0098ea);
			--button: var(--tg-theme-button-color, #0098ea);
			--button-text: var(--tg-theme-button-text-color, #ffffff);
			--secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f4);
			--section-bg: var(--tg-theme-section-bg-color, #ffffff);

			/* Производные токены дизайна */
			--radius-lg: 20px;
			--radius-md: 16px;
			--radius-sm: 12px;
			--shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.06);
			--shadow-card: 0 8px 32px rgba(0, 0, 0, 0.10);
			--ton-grad: linear-gradient(135deg, #0098ea 0%, #00b2ff 50%, #45c0ff 100%);
			--border-subtle: rgba(128, 128, 128, 0.16);
			--skeleton-base: rgba(128, 128, 128, 0.12);
			--skeleton-shine: rgba(128, 128, 128, 0.24);
			--transition: 0.28s cubic-bezier(0.22, 1, 0.36, 1);
		}

		/* Явная коррекция тёмной темы (дополнительно к Telegram) */
		[data-theme="dark"] {
			--shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.4);
			--shadow-card: 0 8px 32px rgba(0, 0, 0, 0.55);
			--border-subtle: rgba(255, 255, 255, 0.10);
			--skeleton-base: rgba(255, 255, 255, 0.06);
			--skeleton-shine: rgba(255, 255, 255, 0.14);
		}

		/* ============================================================
		   2. СБРОС И БАЗОВЫЕ СТИЛИ
		   ============================================================ */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		html,
		body {
			height: 100%;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
				"Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			background-color: var(--bg);
			color: var(--text);
			-webkit-font-smoothing: antialiased;
			text-rendering: optimizeLegibility;
			/* Безопасные отступы под вырезы экрана */
			padding:
				calc(env(safe-area-inset-top, 0px) + 12px)
				calc(env(safe-area-inset-right, 0px) + 16px)
				calc(env(safe-area-inset-bottom, 0px) + 24px)
				calc(env(safe-area-inset-left, 0px) + 16px);
			min-height: 100vh;
			overscroll-behavior-y: contain;
			transition: background-color var(--transition), color var(--transition);
		}

		.app {
			max-width: 520px;
			margin: 0 auto;
			display: flex;
			flex-direction: column;
			gap: 20px;
		}

		/* ============================================================
		   3. АНИМАЦИИ
		   ============================================================ */
		@keyframes fadeInUp {
			from {
				opacity: 0;
				transform: translateY(16px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fadeIn {
			from { opacity: 0; }
			to { opacity: 1; }
		}

		@keyframes shimmer {
			0% { background-position: -468px 0; }
			100% { background-position: 468px 0; }
		}

		.fade-in-up {
			animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
		}

		.fade-in {
			animation: fadeIn 0.5s ease both;
		}

		/* ============================================================
		   4. ШАПКА
		   ============================================================ */
		.header {
			display: flex;
			align-items: center;
			gap: 14px;
			padding: 4px 2px;
		}

		.header .logo {
			flex-shrink: 0;
			width: 52px;
			height: 52px;
			border-radius: var(--radius-md);
			background: var(--ton-grad);
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 6px 18px rgba(0, 152, 234, 0.35);
		}

		.header .logo svg {
			width: 30px;
			height: 30px;
		}

		.header .titles {
			display: flex;
			flex-direction: column;
			gap: 2px;
		}

		.header .titles h1 {
			font-size: 19px;
			font-weight: 700;
			letter-spacing: -0.02em;
		}

		.header .titles p {
			font-size: 13px;
			color: var(--hint);
			font-weight: 500;
		}

		/* ============================================================
		   5. ПОЛЕ ВВОДА
		   ============================================================ */
		.search-card {
			background: var(--secondary-bg);
			border-radius: var(--radius-lg);
			padding: 16px;
			box-shadow: var(--shadow-soft);
			display: flex;
			flex-direction: column;
			gap: 14px;
		}

		.input-wrap {
			position: relative;
			display: flex;
			align-items: center;
		}

		.input-wrap .search-icon {
			position: absolute;
			left: 14px;
			width: 20px;
			height: 20px;
			color: var(--hint);
			pointer-events: none;
		}

		#urlInput {
			width: 100%;
			padding: 14px 44px 14px 42px;
			border: 1.5px solid var(--border-subtle);
			border-radius: var(--radius-md);
			background: var(--bg);
			color: var(--text);
			font-size: 15px;
			font-weight: 500;
			outline: none;
			transition: border-color var(--transition), box-shadow var(--transition);
		}

		#urlInput::placeholder {
			color: var(--hint);
			font-weight: 400;
		}

		#urlInput:focus {
			border-color: var(--button);
			box-shadow: 0 0 0 4px rgba(0, 152, 234, 0.12);
		}

		.clear-btn {
			position: absolute;
			right: 10px;
			width: 26px;
			height: 26px;
			border: none;
			border-radius: 50%;
			background: var(--border-subtle);
			color: var(--hint);
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			opacity: 0;
			visibility: hidden;
			transform: scale(0.6);
			transition: all var(--transition);
		}

		.clear-btn.visible {
			opacity: 1;
			visibility: visible;
			transform: scale(1);
		}

		.clear-btn svg {
			width: 14px;
			height: 14px;
		}

		/* ============================================================
		   6. ГЛАВНАЯ КНОПКА
		   ============================================================ */
		.analyze-btn {
			width: 100%;
			padding: 16px;
			border: none;
			border-radius: var(--radius-md);
			background: var(--ton-grad);
			color: #ffffff;
			font-size: 16px;
			font-weight: 700;
			letter-spacing: 0.01em;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			box-shadow: 0 8px 22px rgba(0, 152, 234, 0.35);
			transition: transform 0.12s ease, box-shadow var(--transition), opacity var(--transition);
		}

		.analyze-btn:active {
			transform: scale(0.975);
			box-shadow: 0 4px 14px rgba(0, 152, 234, 0.30);
		}

		.analyze-btn:disabled {
			opacity: 0.55;
			cursor: not-allowed;
		}

		.analyze-btn svg {
			width: 18px;
			height: 18px;
		}

		.hidden {
			display: none !important;
		}

		/* ============================================================
		   7. SKELETON LOADER (shimmer)
		   ============================================================ */
		.skeleton-card {
			background: var(--secondary-bg);
			border-radius: var(--radius-lg);
			padding: 16px;
			box-shadow: var(--shadow-soft);
			display: flex;
			flex-direction: column;
			gap: 14px;
		}

		.sk {
			background: var(--skeleton-base);
			background-image: linear-gradient(
				90deg,
				var(--skeleton-base) 0px,
				var(--skeleton-shine) 40px,
				var(--skeleton-base) 80px
			);
			background-size: 600px 100%;
			animation: shimmer 1.4s infinite linear;
			border-radius: 10px;
		}

		.sk-image { width: 100%; height: 220px; border-radius: var(--radius-md); }
		.sk-title { width: 65%; height: 22px; }
		.sk-badge { width: 90px; height: 24px; border-radius: 999px; }
		.sk-price { width: 45%; height: 32px; }
		.sk-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 10px;
		}
		.sk-cell { height: 54px; border-radius: var(--radius-sm); }

		/* ============================================================
		   8. КАРТОЧКА РЕЗУЛЬТАТА
		   ============================================================ */
		.result-card {
			background: var(--section-bg);
			border-radius: var(--radius-lg);
			overflow: hidden;
			box-shadow: var(--shadow-card);
			border: 1px solid var(--border-subtle);
		}

		.result-hero {
			position: relative;
			width: 100%;
			height: 280px;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--secondary-bg);
		}

		/* Размытый фон из того же изображения для эффекта глубины */
		.result-hero .bg-blur {
			position: absolute;
			inset: -20px;
			background-size: cover;
			background-position: center;
			filter: blur(28px) saturate(1.3);
			transform: scale(1.2);
			opacity: 0.85;
		}

		.result-hero .bg-overlay {
			position: absolute;
			inset: 0;
			background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.25) 100%);
		}

		.result-hero img.nft {
			position: relative;
			z-index: 2;
			max-width: 78%;
			max-height: 240px;
			border-radius: var(--radius-md);
			box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
			object-fit: cover;
		}

		.result-body {
			padding: 18px;
			display: flex;
			flex-direction: column;
			gap: 16px;
		}

		.result-head {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.result-head h2 {
			font-size: 22px;
			font-weight: 800;
			letter-spacing: -0.02em;
			line-height: 1.2;
		}

		.badge {
			align-self: flex-start;
			padding: 5px 12px;
			border-radius: 999px;
			background: rgba(0, 152, 234, 0.12);
			color: var(--link);
			font-size: 12px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}

		.price-block {
			background: var(--secondary-bg);
			border-radius: var(--radius-md);
			padding: 16px;
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.price-main {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.price-main svg {
			width: 26px;
			height: 26px;
			color: var(--link);
		}

		.price-main .value {
			font-size: 28px;
			font-weight: 800;
			letter-spacing: -0.02em;
		}

		.price-main .ton-label {
			font-size: 16px;
			font-weight: 700;
			color: var(--hint);
			align-self: flex-end;
			margin-bottom: 3px;
		}

		.price-rub {
			font-size: 14px;
			color: var(--hint);
			font-weight: 500;
			padding-left: 34px;
		}

		.meta-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 10px;
		}

		.meta-cell {
			background: var(--secondary-bg);
			border-radius: var(--radius-sm);
			padding: 12px 14px;
			display: flex;
			flex-direction: column;
			gap: 4px;
			min-width: 0;
		}

		.meta-cell .label {
			font-size: 11px;
			color: var(--hint);
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}

		.meta-cell .data {
			font-size: 14px;
			font-weight: 600;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* ============================================================
		   9. ИСТОРИЯ ПРОВЕРОК
		   ============================================================ */
		.history-section {
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.history-section h3 {
			font-size: 15px;
			font-weight: 700;
			color: var(--hint);
			padding-left: 4px;
			letter-spacing: -0.01em;
		}

		.history-list {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.history-item {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 10px;
			border-radius: var(--radius-md);
			background: var(--secondary-bg);
			cursor: pointer;
			transition: transform 0.12s ease, background var(--transition);
		}

		.history-item:active {
			transform: scale(0.98);
		}

		.history-item img {
			width: 44px;
			height: 44px;
			border-radius: 10px;
			object-fit: cover;
			flex-shrink: 0;
			background: var(--border-subtle);
		}

		.history-item .h-info {
			display: flex;
			flex-direction: column;
			gap: 2px;
			min-width: 0;
			flex: 1;
		}

		.history-item .h-name {
			font-size: 14px;
			font-weight: 600;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.history-item .h-price {
			font-size: 13px;
			color: var(--link);
			font-weight: 700;
			display: flex;
			align-items: center;
			gap: 4px;
		}

		.history-item .h-price svg {
			width: 13px;
			height: 13px;
		}

		.history-item .chevron {
			width: 18px;
			height: 18px;
			color: var(--hint);
			flex-shrink: 0;
		}

		.history-empty {
			font-size: 13px;
			color: var(--hint);
			text-align: center;
			padding: 20px;
		}
	</style>
</head>
<body>
	<div class="app">
		<!-- ============ ШАПКА ============ -->
		<header class="header">
			<div class="logo">
				<!-- SVG-логотип TON (адаптивный, наследует белый цвет на градиенте) -->
				<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path
						d="M37.6 15.6H18.4c-3.53 0-5.77 3.81-3.99 6.89l11.78 20.43c.78 1.34 2.72 1.34 3.5 0l11.79-20.43c1.77-3.07-.47-6.89-3.88-6.89zM26.18 36.9l-2.57-4.96-6.19-11.07c-.41-.71.09-1.62.99-1.62h7.77v17.65zm12.39-16.03l-6.18 11.08-2.57 4.95V19.25h7.77c.9 0 1.4.91.98 1.62z"
						fill="#ffffff"
					/>
				</svg>
			</div>
			<div class="titles">
				<h1>Getgems NFT Анализатор</h1>
				<p>Оценка и анализ NFT в сети TON</p>
			</div>
		</header>

		<!-- ============ ПОЛЕ ВВОДА + КНОПКА ============ -->
		<section class="search-card fade-in-up">
			<div class="input-wrap">
				<!-- SVG иконка поиска -->
				<svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
					<circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
					<path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
				</svg>

				<input
					type="text"
					id="urlInput"
					placeholder="Вставьте ссылку на NFT с Getgems"
					inputmode="url"
					autocomplete="off"
					autocapitalize="off"
					spellcheck="false"
				/>

				<!-- Кнопка очистки (крестик), появляется только при наличии текста -->
				<button class="clear-btn" id="clearBtn" type="button" aria-label="Очистить">
					<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
						<path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
					</svg>
				</button>
			</div>

			<button class="analyze-btn" id="analyzeBtn" type="button">
				<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M13 3L4 14h6l-1 7 9-11h-6l1-7z" fill="currentColor" />
				</svg>
				Анализировать
			</button>
		</section>

		<!-- ============ SKELETON LOADER ============ -->
		<section class="skeleton-card hidden" id="skeleton">
			<div class="sk sk-image"></div>
			<div class="sk sk-title"></div>
			<div class="sk sk-badge"></div>
			<div class="sk sk-price"></div>
			<div class="sk-grid">
				<div class="sk sk-cell"></div>
				<div class="sk sk-cell"></div>
				<div class="sk sk-cell"></div>
				<div class="sk sk-cell"></div>
			</div>
		</section>

		<!-- ============ КАРТОЧКА РЕЗУЛЬТАТА (скрыта по умолчанию) ============ -->
		<section class="result-card hidden" id="resultCard">
			<div class="result-hero">
				<div class="bg-blur" id="heroBlur"></div>
				<div class="bg-overlay"></div>
				<img class="nft" id="nftImage" alt="NFT" />
			</div>
			<div class="result-body">
				<div class="result-head">
					<h2 id="nftName">—</h2>
					<span class="badge" id="nftType">—</span>
				</div>

				<div class="price-block">
					<div class="price-main">
						<!-- SVG-иконка кристалла TON -->
						<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path
								d="M37.6 15.6H18.4c-3.53 0-5.77 3.81-3.99 6.89l11.78 20.43c.78 1.34 2.72 1.34 3.5 0l11.79-20.43c1.77-3.07-.47-6.89-3.88-6.89zM26.18 36.9l-2.57-4.96-6.19-11.07c-.41-.71.09-1.62.99-1.62h7.77v17.65zm12.39-16.03l-6.18 11.08-2.57 4.95V19.25h7.77c.9 0 1.4.91.98 1.62z"
								fill="currentColor"
						/>
						</svg>
						<span class="value" id="priceTon">0</span>
						<span class="ton-label">TON</span>
					</div>
					<div class="price-rub" id="priceRub">≈ — ₽</div>
				</div>

				<div class="meta-grid">
					<div class="meta-cell">
						<span class="label">Коллекция</span>
						<span class="data" id="metaCollection">—</span>
					</div>
					<div class="meta-cell">
						<span class="label">Владелец</span>
						<span class="data" id="metaOwner">—</span>
					</div>
					<div class="meta-cell">
						<span class="label">Ранг редкости</span>
						<span class="data" id="metaRarity">—</span>
					</div>
					<div class="meta-cell">
						<span class="label">Статус</span>
						<span class="data" id="metaStatus">—</span>
					</div>
				</div>
			</div>
		</section>

		<!-- ============ ИСТОРИЯ ПРОВЕРОК ============ -->
		<section class="history-section" id="historySection">
			<h3>Недавние проверки</h3>
			<div class="history-list" id="historyList">
				<div class="history-empty" id="historyEmpty">Здесь появятся ваши последние проверки</div>
			</div>
		</section>
	</div>

	<script>
		/* ============================================================
		   КОНФИГУРАЦИЯ
		   ============================================================ */
		// ВАЖНО: замените <ТВОЙ_НИК> на ваш реальный неймспейс Hugging Face Space
		const API_URL = "https://useralpra123-parser.hf.space/api/parse";

		// Ключ и лимит истории в localStorage
		const STORAGE_KEY = "getgems_history_v1";
		const HISTORY_LIMIT = 5;

		// Курс для приблизительного расчёта рублей (запасной вариант, если сервер не вернул)
		const FALLBACK_TON_RUB = 280;

		/* ============================================================
		   ИНИЦИАЛИЗАЦИЯ TELEGRAM WEBAPP
		   ============================================================ */
		const tg = window.Telegram ? window.Telegram.WebApp : null;

		// Безопасная обёртка тактильной отдачи (haptic)
		function haptic(type) {
			try {
				if (tg && tg.HapticFeedback) {
					tg.HapticFeedback.impactOccurred(type || "medium");
				}
			} catch (e) {
				/* игнорируем, если запущено вне Telegram */
			}
		}

		// Безопасный alert (в Telegram — нативный, иначе — браузерный)
		function showAlert(message) {
			try {
				if (tg && typeof tg.showAlert === "function") {
					tg.showAlert(message);
					return;
				}
			} catch (e) {}
			alert(message);
		}

		// Применение темы: пробрасываем data-theme для кастомной коррекции
		function applyTheme() {
			try {
				const scheme = tg && tg.colorScheme ? tg.colorScheme : "light";
				document.documentElement.setAttribute("data-theme", scheme);
				if (tg && tg.setHeaderColor) {
					tg.setHeaderColor("bg_color");
				}
			} catch (e) {
				document.documentElement.setAttribute("data-theme", "light");
			}
		}

		if (tg) {
			tg.ready();
			tg.expand();                       // Разворачиваем на весь экран
			tg.enableClosingConfirmation();    // Защита от случайных свайпов закрытия
			applyTheme();
			// Реагируем на смену темы пользователем
			tg.onEvent("themeChanged", applyTheme);
		} else {
			// Фолбэк, если открыто в обычном браузере
			document.documentElement.setAttribute("data-theme", "light");
		}

		/* ============================================================
		   ССЫЛКИ НА DOM-ЭЛЕМЕНТЫ
		   ============================================================ */
		const urlInput = document.getElementById("urlInput");
		const clearBtn = document.getElementById("clearBtn");
		const analyzeBtn = document.getElementById("analyzeBtn");
		const skeleton = document.getElementById("skeleton");
		const resultCard = document.getElementById("resultCard");
		const historyList = document.getElementById("historyList");
		const historyEmpty = document.getElementById("historyEmpty");

		// Поля карточки результата
		const nftImage = document.getElementById("nftImage");
		const heroBlur = document.getElementById("heroBlur");
		const nftName = document.getElementById("nftName");
		const nftType = document.getElementById("nftType");
		const priceTon = document.getElementById("priceTon");
		const priceRub = document.getElementById("priceRub");
		const metaCollection = document.getElementById("metaCollection");
		const metaOwner = document.getElementById("metaOwner");
		const metaRarity = document.getElementById("metaRarity");
		const metaStatus = document.getElementById("metaStatus");

		/* ============================================================
		   УТИЛИТЫ
		   ============================================================ */
		// Безопасное число
		function toNumber(v) {
			const n = parseFloat(v);
			return isNaN(n) ? 0 : n;
		}

		// Форматирование числа с разделителями (ru-RU)
		function formatNum(n, maxFrac) {
			try {
				return Number(n).toLocaleString("ru-RU", {
					maximumFractionDigits: typeof maxFrac === "number" ? maxFrac : 2,
				});
			} catch (e) {
				return String(n);
			}
		}

		// Защита от вставки HTML в текстовые узлы
		function safeText(el, value) {
			el.textContent = value === undefined || value === null || value === "" ? "—" : String(value);
		}

		// Управление кнопкой очистки
		function updateClearBtn() {
			if (urlInput.value.trim().length > 0) {
				clearBtn.classList.add("visible");
			} else {
				clearBtn.classList.remove("visible");
			}
		}

		/* ============================================================
		   НОРМАЛИЗАЦИЯ ДАННЫХ КАРТОЧКИ
		   Поддерживаем как плоский JSON, так и вложенный data {...}
		   ============================================================ */
		function normalizeData(payload) {
			const d = (payload && payload.data) ? payload.data : payload || {};
			const priceTonVal = toNumber(d.price_ton != null ? d.price_ton : d.price);
			let priceRubVal = toNumber(d.price_rub);
			if (!priceRubVal && priceTonVal) {
				const rate = toNumber(d.ton_rub_rate) || FALLBACK_TON_RUB;
				priceRubVal = priceTonVal * rate;
			}
			return {
				url: d.url || "",
				image: d.image || d.image_url || "",
				name: d.name || d.title || "NFT без названия",
				type: d.type || d.item_type || "NFT",
				priceTon: priceTonVal,
				priceRub: priceRubVal,
				collection: d.collection || d.collection_name || "—",
				owner: d.owner || d.owner_address || "—",
				rarity: d.rarity != null ? d.rarity : (d.rank != null ? d.rank : "—"),
				status: d.status || d.sale_status || "—",
			};
		}

		/* ============================================================
		   ОТОБРАЖЕНИЕ КАРТОЧКИ РЕЗУЛЬТАТА
		   ============================================================ */
		function renderResult(data) {
			const n = normalizeData(data);

			// Изображение + размытый фон из той же картинки
			if (n.image) {
				nftImage.src = n.image;
				heroBlur.style.backgroundImage = 'url("' + n.image + '")';
			} else {
				nftImage.removeAttribute("src");
				heroBlur.style.backgroundImage = "none";
			}
			nftImage.alt = n.name;

			safeText(nftName, n.name);
			safeText(nftType, n.type);
			safeText(priceTon, formatNum(n.priceTon, 2));
			priceRub.textContent = "≈ " + formatNum(Math.round(n.priceRub), 0) + " ₽";

			safeText(metaCollection, n.collection);
			safeText(metaOwner, n.owner);
			safeText(metaRarity, n.rarity);
			safeText(metaStatus, n.status);

			// Плавное появление: перезапускаем анимацию
			resultCard.classList.remove("hidden");
			resultCard.classList.remove("fade-in-up");
			// Форсируем reflow, чтобы анимация проиграла заново
			void resultCard.offsetWidth;
			resultCard.classList.add("fade-in-up");

			// Прокрутка к результату
			setTimeout(function () {
				resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
			}, 60);
		}

		/* ============================================================
		   УПРАВЛЕНИЕ СОСТОЯНИЕМ ЗАГРУЗКИ
		   ============================================================ */
		function setLoading(isLoading) {
			if (isLoading) {
				// Скрываем результат и кнопку на странице, показываем skeleton
				resultCard.classList.add("hidden");
				analyzeBtn.classList.add("hidden");
				skeleton.classList.remove("hidden");
				skeleton.classList.remove("fade-in");
				void skeleton.offsetWidth;
				skeleton.classList.add("fade-in");

				// Нативная MainButton Telegram
				try {
					if (tg && tg.MainButton) {
						tg.MainButton.setText("Синхронизация... 🔄");
						tg.MainButton.show();
					tg.MainButton.showProgress(false);
					tg.MainButton.disable();
				}
			} catch (e) {}
			} else {
				skeleton.classList.add("hidden");
				analyzeBtn.classList.remove("hidden");
				try {
					if (tg && tg.MainButton) {
						tg.MainButton.hideProgress();
						tg.MainButton.hide();
						tg.MainButton.enable();
					}
				} catch (e) {}
			}
		}

		/* ============================================================
		   РАБОТА С ИСТОРИЕЙ (localStorage)
		   ============================================================ */
		function loadHistory() {
			try {
				const raw = localStorage.getItem(STORAGE_KEY);
				if (!raw) return [];
				const arr = JSON.parse(raw);
				return Array.isArray(arr) ? arr : [];
			} catch (e) {
				return [];
			}
		}

		function saveHistory(list) {
			try {
				localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
			} catch (e) {
				/* квота переполнена или приватный режим — игнорируем */
			}
		}

		// Добавляем запись: новые сверху, без дублей по url запроса, лимит 5
		function addToHistory(requestUrl, payload) {
			const n = normalizeData(payload);
			const entry = {
				requestUrl: requestUrl,
				data: payload && payload.data ? payload.data : payload,
				preview: {
					image: n.image,
					name: n.name,
					priceTon: n.priceTon,
				},
				ts: Date.now(),
			};
			let list = loadHistory().filter(function (it) {
				return it.requestUrl !== requestUrl;
			});
			list.unshift(entry);
			if (list.length > HISTORY_LIMIT) list = list.slice(0, HISTORY_LIMIT);
			saveHistory(list);
			renderHistory();
		}

		// Маленькая SVG-иконка TON для истории
		const TON_MINI_SVG =
			'<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">' +
			'<path d="M37.6 15.6H18.4c-3.53 0-5.77 3.81-3.99 6.89l11.78 20.43c.78 1.34 2.72 1.34 3.5 0l11.79-20.43c1.77-3.07-.47-6.89-3.88-6.89zM26.18 36.9l-2.57-4.96-6.19-11.07c-.41-.71.09-1.62.99-1.62h7.77v17.65zm12.39-16.03l-6.18 11.08-2.57 4.95V19.25h7.77c.9 0 1.4.91.98 1.62z" fill="currentColor"/>' +
			'</svg>';

		const CHEVRON_SVG =
			'<svg class="chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
			'<path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
			'</svg>';

		function renderHistory() {
			const list = loadHistory();
			historyList.innerHTML = "";

			if (!list.length) {
				const empty = document.createElement("div");
				empty.className = "history-empty";
				empty.textContent = "Здесь появятся ваши последние проверки";
				historyList.appendChild(empty);
				return;
			}

			list.forEach(function (item) {
				const row = document.createElement("div");
				row.className = "history-item fade-in";

				// Превью-картинка
				const img = document.createElement("img");
				if (item.preview && item.preview.image) img.src = item.preview.image;
				img.alt = (item.preview && item.preview.name) || "NFT";
				img.loading = "lazy";

				// Инфо-блок
				const info = document.createElement("div");
				info.className = "h-info";

				const name = document.createElement("span");
				name.className = "h-name";
				name.textContent = (item.preview && item.preview.name) || "NFT";

				const price = document.createElement("span");
				price.className = "h-price";
				price.innerHTML = TON_MINI_SVG + " " + formatNum(item.preview ? item.preview.priceTon : 0, 2) + " TON";

				info.appendChild(name);
				info.appendChild(price);

				// Шеврон
				const chevWrap = document.createElement("div");
				chevWrap.innerHTML = CHEVRON_SVG;

				row.appendChild(img);
				row.appendChild(info);
				row.appendChild(chevWrap.firstChild);

				// Клик — мгновенная подстановка ссылки и показ кэша без запроса
				row.addEventListener("click", function () {
					haptic("light");
					urlInput.value = item.requestUrl || "";
					updateClearBtn();
					renderResult(item.data || {});
				});

				historyList.appendChild(row);
			});
		}

		/* ============================================================
		   ОСНОВНОЙ СЦЕНАРИЙ: АНАЛИЗ NFT
		   ============================================================ */
		let isFetching = false;

		async function analyze() {
			if (isFetching) return;

			const value = urlInput.value.trim();

			// Валидация ввода
			if (!value) {
				haptic("rigid");
				showAlert("Пожалуйста, вставьте ссылку на NFT с Getgems.");
				urlInput.focus();
				return;
			}
			if (!/^https?:\/\//i.test(value)) {
				haptic("rigid");
				showAlert("Ссылка должна начинаться с http:// или https://");
				return;
			}

			haptic("medium");
			isFetching = true;
			analyzeBtn.disabled = true;
			setLoading(true);

			// Таймаут запроса (30 секунд)
			const controller = new AbortController();
			const timeout = setTimeout(function () {
				controller.abort();
			}, 30000);

			try {
				const response = await fetch(API_URL, {
					method: "POST",
					headers: {
						"Content-Type": "application/json",
						Accept: "application/json",
					},
					body: JSON.stringify({ url: value }),
					signal: controller.signal,
				});

				clearTimeout(timeout);

				// Пытаемся распарсить JSON в любом случае
				let payload = null;
				try {
					payload = await response.json();
				} catch (e) {
					payload = null;
				}

				if (!response.ok || !payload || payload.success !== true) {
					// Ошибка сервера или success: false
					const msg =
						(payload && (payload.error || payload.message)) ||
						"Не удалось получить данные. Проверьте ссылку и попробуйте снова.";
					haptic("heavy");
					setLoading(false);
					showAlert(msg);
					return;
				}

				// Успех
				haptic("light");
				setLoading(false);
				renderResult(payload);
				addToHistory(value, payload);
			} catch (error) {
				clearTimeout(timeout);
				// Ошибка сети / таймаут / abort
				haptic("heavy");
				setLoading(false);
				const netMsg =
					error && error.name === "AbortError"
						? "Превышено время ожидания ответа сервера. Попробуйте позже."
						: "Ошибка сети. Проверьте подключение к интернету и попробуйте снова.";
				showAlert(netMsg);
			} finally {
				isFetching = false;
				analyzeBtn.disabled = false;
			}
		}

		/* ============================================================
		   ОБРАБОТЧИКИ СОБЫТИЙ
		   ============================================================ */
		urlInput.addEventListener("input", updateClearBtn);

		urlInput.addEventListener("keydown", function (e) {
			if (e.key === "Enter") {
				e.preventDefault();
				urlInput.blur();
				analyze();
			}
		});

		clearBtn.addEventListener("click", function () {
			haptic("light");
			urlInput.value = "";
			updateClearBtn();
			urlInput.focus();
		});

		analyzeBtn.addEventListener("click", analyze);

		// Клик по нативной MainButton тоже запускает анализ (на случай, если используется)
		try {
			if (tg && tg.MainButton) {
				tg.MainButton.onClick(function () {
					if (!isFetching) analyze();
				});
			}
		} catch (e) {}

		/* ============================================================
		   ПЕРВИЧНЫЙ РЕНДЕР
		   ============================================================ */
		updateClearBtn();
		renderHistory();
	</script>
</body>
</html>
